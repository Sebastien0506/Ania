services:
  db:
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"
    
    environment:
      POSTGRES_DB: "app_bot"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
  
  back:
    build: ./back
    ports:
      - "8000:8000"
    
    depends_on:
      - db

  front:
    build: ./front
    ports:
      - "4200:4200"